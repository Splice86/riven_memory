# Secrets Template for riven-memory
# Copy this to secrets.yaml (gitignored) and fill in your values.
# Committed baseline below is the fallback if no secrets.yaml exists.

# LLM summarization credentials
llm:
  url: "http://127.0.0.1:8010"
  api_key: "sk-dummy"
  model: "nvidia/MiniMax-M2.5-NVFP4"
  context_window: 128000

# Memory API server defaults
api:
  host: "0.0.0.0"
  port: 8030

# Database defaults
database:
  db_dir: "./database"
  default_db: "riven.db"
