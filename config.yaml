# Memory API Configuration
# This file is gitignored - add local overrides to memory/config_local.yaml

# Database settings
database:
  # Directory for DB files (relative to this file's location)
  db_dir: "./database"
  # Default database name (full filename)
  default_db: "default.db"

# Embedding cache settings
cache:
  # Directory for cache files
  cache_dir: "./database"
  # Cache database filename
  cache_db: "embeddings_cache.db"

# Memory API server
api:
  host: "0.0.0.0"
  port: 8030

# LLM settings for summarization - see secrets_template.yaml for defaults
# DO NOT set url/model here - those come from secrets (secrets.yaml > secrets_template.yaml)

# Context / Summarization settings
context:
  # Temporal clustering: new cluster if gap > this many minutes
  cluster_gap_minutes: 2
  # Don't summarize messages from the last N minutes (active session)
  cluster_exclude_minutes: 3
  # Minimum cluster size before triggering summarization
  min_cluster_size: 3

# Embedding settings
embedding:
  model_size: "270m"  # 270m, 0.6b, or 27b
  force_cpu: true
